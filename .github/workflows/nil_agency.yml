name: NIL AGENCY
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    paths: ['tasks/queue.json']
jobs:
  orchestrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic python-dotenv
      - name: Run NIL AGENCY
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python3 orchestrator.py --cycles 3 --mode github-actions
      - name: Commit outputs
        run: |
          git config user.name "nil-agency[bot]"
          git config user.email "nil-agency@users.noreply.github.com"
          git add outputs/ memory/ tasks/completed/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "NIL AGENCY $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || true
      # Phase 11: the main loop swallows exceptions internally, so this job
      # "succeeding" doesn't mean a cycle actually completed. Fail the run
      # loudly (red X in Actions) if memory/heartbeat.json is stale or missing.
      - name: Check heartbeat freshness
        run: python3 orchestrator.py --check-heartbeat
